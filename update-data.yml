name: Update pearl jewelry trends data

on:
  schedule:
    # Runs every day at 06:00 UTC. Edit the cron expression to change the time.
    - cron: "0 6 * * *"
  workflow_dispatch: {}  # lets you trigger a manual run from the Actions tab

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch fresh data
        env:
          YT_API_KEY: ${{ secrets.YT_API_KEY }}
        run: python fetch_youtube_data.py

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "Update pearl jewelry trends data"
          git push
